<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENT BOOSTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.251b6741.css">
  <script src="/style.251b6741.js"></script></head>
  <body>
    <header class="header">
      <div class="header__container container">
        <a href="#" class="header__logo">
            <img src="/logo.f1d8a4c6.svg" alt="Event Booster">
        </a>
        <div class="header__content">
            <h1 class="header__title">FIND BEST EVENTS <br> AROUND THE WORLD</h1>
            <div class="header__search">
                <div class="header__keyword">
                    <input type="text" class="header__input" id="searchInput" placeholder="Start searching">
                    <button class="header__btn" id="searchBtn">
                      <img src="/search.1e31d98f.svg" alt="search">
                    </button>
                </div>
                <div class="header__country">
                    <input type="text" class="header__input header__input-country" id="countryInput" placeholder="Choose country">
                    <button class="header__btn" id="arrowBtn">
                      <img src="/arrow.28e30bbc.svg" alt="choose country">
                    </button>
                    <ul class="country-dropdown" id="countryDropdown"></ul>
                </div>
            </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="main__container container">
        <p id="message"></p>
        <div class="modal-container">
          <div class="modal">
          </div>
        </div>
        <ul class="events-list"></ul>
        <div class="pagination"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__container container">
        <p class="footer__text">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
      </div>
    </footer>

    <script type="module" src="/js.00a46daa.js"></script>
  </body>
</html>
