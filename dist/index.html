<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVENT BOOSTER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/team-project.4ee4707b.css">
</head>

<body>
  <header class="header">
    <div class="header__container container">
      <a href="#" class="header__logo">
        <img src="/logo.8bb9af93.svg" alt="Event Booster">
      </a>
      <div class="header__content">
        <h1 class="header__title">FIND BEST EVENTS <br> AROUND THE WORLD</h1>
        <div class="header__search">
          <div class="header__keyword">
            <input type="text" class="header__input" id="searchInput" placeholder="Start searching">
            <button class="header__btn" id="searchBtn">
              <img src="/search.41637273.svg" alt="search">
            </button>
          </div>
          <div class="header__country">
            <input type="text" class="header__input header__input-country" id="countryInput" placeholder="Choose country">
            <button class="header__btn" id="arrowBtn">
              <img src="/arrow.b9dab6f1.svg" alt="choose country">
            </button>
            <ul class="country-dropdown" id="countryDropdown"></ul>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="main__container container">
      <ul class="events-list"></ul>
    </div>
  </main>

  <div id="pagination"></div>

  <footer class="footer">
    <div class="footer__container container"></div>
  </footer>

  <script type="module" src="/team-project.6528c13b.js"></script>
  <script src="/team-project.df453969.js"></script>

    <main class="main">
      <div class="main__container container">
        <p id="message"></p>
        <ul class="events-list"></ul>
        <div class="pagination"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__container container">
        <p class="footer__text">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
      </div>
    </footer>

</body></html>
