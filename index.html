<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>EVENT BOOSTER</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&amp;display=swap" rel=stylesheet><link rel=stylesheet href=team-project.95b78dfb.css><body>
    <header class=header>
      <div class="container header__container">
        <a href=# class=header__logo>
            <img src=logo.1574a89e.svg alt="Event Booster">
        </a>
        <div class=header__content>
            <h1 class=header__title>FIND BEST EVENTS <br> AROUND THE WORLD</h1>
            <div class=header__search>
                <div class=header__keyword>
                    <input class=header__input id=searchInput placeholder="Start searching">
                    <button class=header__btn id=searchBtn>
                      <img src=search.09c40fdc.svg alt=search>
                    </button>
                </div>
                <div class=header__country>
                    <input class="header__input header__input-country" id=countryInput placeholder="Choose country">
                    <button class=header__btn id=arrowBtn>
                      <img src=arrow.ff074592.svg alt="choose country">
                    </button>
                    <ul class=country-dropdown id=countryDropdown></ul>
                </div>
            </div>
        </div>
      </div>
    </header>

    <main class=main>
      <div class="container main__container">
        <p id=message></p>
        <div class=modal-container>
          <div class=modal>
          </div>
        </div>
        <ul class=events-list></ul>
        <div class=pagination></div>
      </div>
    </main>

    <footer class=footer>
      <div class="container footer__container">
        <p class=footer__text>© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
      </div>
    </footer>

    <script type=module src=team-project.64d3b2f3.js></script>
